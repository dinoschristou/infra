services:
  stirlingpdf:
    image: frooodle/s-pdf:2.12.0@sha256:2bb9b67f3edbca7ecc80f6e851a02cd04a10d5ea1d69b3e80b1e1f615e97b7a2
    networks:
      - proxy
    container_name: stirlingpdf
    volumes:
      - "./configs:/configs"
      - "./ocr-data:/usr/share/tesseract-ocr/5/tessdata"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.pdf.rule=Host(`pdf.${FULL_DOMAIN}`)"
      - "traefik.http.routers.pdf.entrypoints=https"
      - "traefik.http.routers.pdf.tls=true"
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - TZ=${TZ}
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
    env_file:
      - .env

networks:
  proxy:
    external: true