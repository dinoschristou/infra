services:
  scrypted:
    image: ghcr.io/koush/scrypted:v0.144.1-noble-full@sha256:25440767192b0d4a0709f50388d14cdf365ba6bff59d04e40a41ca2b7b9a6b70
    container_name: scrypted
    volumes:
      - scrypted_data:/server/volume
    environment:
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
    networks:
      - proxy
    env_file:
      - .env
    logging:
      driver: "none"
    expose:
      - 11080
      - 10443
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.scrypted.rule=Host(`scrypted.${FULL_DOMAIN}`)"
      - "traefik.http.routers.scrypted.entrypoints=https"
      - "traefik.http.routers.scrypted.tls=true"
      - "traefik.http.services.scrypted.loadbalancer.server.port=11080"

volumes:
  scrypted_data:
    name: scrypted_data
    driver: local
networks:
  proxy:
    external: true