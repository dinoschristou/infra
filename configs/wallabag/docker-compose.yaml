services:
  wallabag:
    image: wallabag/wallabag:2.6.14@sha256:4a527e027e0d59e87c14225ef11e005af3d4890374202ad319ce5e63dfc66709
    restart: unless-stopped
    container_name: wallabag
    networks:
      - proxy
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
      - SYMFONY__ENV__DATABASE_DRIVER=pdo_mysql
      - SYMFONY__ENV__DATABASE_HOST=wallabag-db
      - SYMFONY__ENV__DATABASE_PORT=3306
      - SYMFONY__ENV__DATABASE_NAME=wallabag
      - SYMFONY__ENV__DATABASE_USER=${DB_USER}
      - SYMFONY__ENV__DATABASE_PASSWORD=${DB_PASS}
      - SYMFONY__ENV__DATABASE_CHARSET=utf8mb4
      - SYMFONY__ENV__DATABASE_TABLE_PREFIX=wallabag_
      - SYMFONY__ENV__DOMAIN_NAME=https://read.dinos.sh
      - SYMFONY__ENV__SERVER_NAME=Wallabag
      - SYMFONY__ENV__REDIS_HOST=wallabag-redis
      - SYMFONY__ENV__FOSUSER_REGISTRATION=true
      - SYMFONY__ENV__FOSUSER_CONFIRMATION=false
      - SYMFONY__ENV__MAILER_DSN=null://null
    ports:
      - "80"
    volumes:
      - ./images:/var/www/wallabag/web/assets/images
    depends_on:
      wallabag-db:
        condition: service_healthy
      wallabag-redis:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - "traefik.http.routers.wallabag.rule=Host(`read.${FULL_DOMAIN}`)"
      - "traefik.http.routers.wallabag.entrypoints=https"
      - "traefik.http.routers.wallabag.tls=true"
      - "traefik.http.services.wallabag.loadbalancer.server.port=80"
  wallabag-db:
    image: mariadb:11@sha256:be1ef4fe5f14589325c08a41c76334097ce66c86264b75e1d28342c742782a61
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASS}
      # - MYSQL_DATABASE=wallabag
      # - MYSQL_USER=${DB_USER}
      # - MYSQL_PASSWORD=${DB_PASS}
    env_file:
      - .env
    networks:
      - proxy
    volumes:
      - ./data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 3s
      retries: 5
    container_name: wallabag-db
  wallabag-redis:
    image: redis:8.6-alpine@sha256:d103b9cd0b54b98b2c38e2b19220ee7adfe4b0fb22c406baa75f321179da2f00
    restart: unless-stopped
    networks:
      - proxy
    container_name: wallabag-redis
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s

networks:
  proxy:
    external: true