services:
  homebridge:
    image: homebridge/homebridge:2026-06-05@sha256:2bcdd4d1a30f4ed31f1720f52e4cbcf94ec8094cdf89530068a20b94789bd0e7
    container_name: homebridge
    restart: unless-stopped
    networks:
      - proxy
    env_file:
      - .env
    volumes:
      - "./data:/homebridge"
    logging:
      driver: json-file
      options:
        max-size: "10mb"
        max-file: "1"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homebridge.rule=Host(`homebridge.${FULL_DOMAIN}`)"
      - "traefik.http.routers.homebridge.entrypoints=https"
      - "traefik.http.routers.homebridge.tls=true"
      - "traefik.http.services.homebridge.loadbalancer.server.port=8581"

networks:
  proxy:
    external: true