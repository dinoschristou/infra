services:
  prometheus:
    image: prom/prometheus:v3.12.0@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    container_name: prometheus
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/config.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.size=80GB"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.wal-compression"
    restart: unless-stopped
    expose:
      - 9090
    env_file:
      - .env
    networks:
      - proxy
    labels:
      - "org.label-schema.group=monitoring"
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${FULL_DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=https"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  alertmanager:
    image: prom/alertmanager:v0.32.2@sha256:b85533a2eb45865835315810315f6951331b2dbc8c93a6cf9a51e156a006a706
    container_name: alertmanager
    volumes:
      - ./alertmanager:/etc/alertmanager
    command:
      - "--config.file=/etc/alertmanager/config.yaml"
      - "--storage.path=/alertmanager"
    restart: unless-stopped
    expose:
      - 9093
    networks:
      - proxy
    env_file:
      - .env
    labels:
      - "org.label-schema.group=monitoring"
      - "traefik.enable=true"
      - "traefik.http.routers.alertmanager.rule=Host(`alertmanager.${FULL_DOMAIN}`)"
      - "traefik.http.routers.alertmanager.entrypoints=https"
      - "traefik.http.routers.alertmanager.tls=true"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

  loki:
    image: grafana/loki:3.7.2@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - proxy
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=Host(`loki.${FULL_DOMAIN}`)"
      - "traefik.http.routers.loki.entrypoints=https"
      - "traefik.http.routers.loki.tls=true"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"

  grafana:
    image: grafana/grafana:13.0.1@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    expose:
      - 3000
    networks:
      - proxy
    env_file:
      - .env
    labels:
      - "org.label-schema.group=monitoring"
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${FULL_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=https"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  pushgateway:
    image: prom/pushgateway:v1.11.3@sha256:74fa117cef2d7e383112d25139ff1c2d2e309c35389a9e0554a47136a1482e48
    container_name: pushgateway
    restart: unless-stopped
    expose:
      - 9091
    networks:
      - proxy
    env_file:
      - .env
    labels:
      - "org.label-schema.group=monitoring"
      - "traefik.enable=true"
      - "traefik.http.routers.pushgateway.rule=Host(`pushgateway.${FULL_DOMAIN}`)"
      - "traefik.http.routers.pushgateway.entrypoints=https"
      - "traefik.http.routers.pushgateway.tls=true"
      - "traefik.http.services.pushgateway.loadbalancer.server.port=9091"

  pihole-exporter1:
    image: ekofr/pihole-exporter:v1.2.0@sha256:242c53ef3c24b88fcbe8184390b456d05604bd50de5732ca3fd3eb24395585b3
    container_name: pihole-exporter1
    environment:
      - PIHOLE_PROTOCOL=http
      - PIHOLE_HOSTNAME=${PIHOLE_HOSTNAME}
      - "PIHOLE_PASSWORD=${PIHOLE_PASSWORD}"
      - PORT=9617
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - 9617
    env_file:
      - .env
    
  pihole-exporter2:
    image: ekofr/pihole-exporter:v1.2.0@sha256:242c53ef3c24b88fcbe8184390b456d05604bd50de5732ca3fd3eb24395585b3
    container_name: pihole-exporter2
    environment:
      - PIHOLE_PROTOCOL=http
      - PIHOLE_HOSTNAME=${PIHOLE_BACKUP_HOSTNAME}
      - "PIHOLE_PASSWORD=${PIHOLE_BACKUP_PASSWORD}"
      - PORT=9618
    restart: unless-stopped
    networks:
      - proxy
    expose:
      - 9618
    env_file:
      - .env

  proxmox-exporter:
    image: prompve/prometheus-pve-exporter:3.9.0@sha256:78a58df7a31c9fbee94962cd06422672668529de6421892df9aed4b6cee0757f
    container_name: proxmox-exporter
    volumes:
      - ./pve:/etc/pve_exporter
    command:
      - "--config.file=/etc/pve_exporter/pve.yml"
    restart: unless-stopped
    expose:
      - 9221
    networks:
      - proxy
    env_file:
      - .env

  prometheus-plex-exporter:
    container_name: prometheus-plex-exporter
    image: ghcr.io/timothystewart6/prometheus-plex-exporter:latest@sha256:90dc0799601c334f2945a3d5b4b552a06352b208a8ce88a428cf90d6c9aa51cd
    pull_policy: always
    restart: unless-stopped
    networks:
      - proxy
    env_file:
      - .env
    expose:
     - 9000
    security_opt:
      - no-new-privileges:true

  unpoller:
    image: ghcr.io/unpoller/unpoller:v3.2.0@sha256:bf7bdcc59fcdaa4699687007aa3ec24ddb3c9d9521f392d8c7aa2bea1bdb781a
    restart: unless-stopped
    networks:
      - proxy
    container_name: unpoller
    env_file:
      - .env
    ports:
      - '9130:9130'

networks:
  proxy:
    external: true

volumes:
  prometheus_data:
    driver: local
    name: prometheus_data
  grafana_data:
    driver: local
    name: grafana_data
  loki_data:
    driver: local
    name: loki_data
