services:
  freshrss:
    image: lscr.io/linuxserver/freshrss:1.29.1@sha256:b24ddde7d465f004847305b70d2479eb31c218e777bf2ab97d42dc75b54ed914
    networks:
      - proxy
    container_name: freshrss
    volumes:
      - freshrss_data:/config
    labels:
      - traefik.enable=true
      - "traefik.http.routers.freshrss.rule=Host(`freshrss.${FULL_DOMAIN}`)"
      - "traefik.http.routers.freshrss.entrypoints=https"
      - "traefik.http.routers.freshrss.tls=true"
    environment:
      - "PUID=1000"
      - "PGID=1000"
      - "TZ=${TIMEZONE}"
      - "CRON_MIN=5,25,45"
    restart: unless-stopped
    env_file:
      - .env

networks:
  proxy:
    external: true

volumes:
  freshrss_data:
    name: freshrss_data
    driver: local