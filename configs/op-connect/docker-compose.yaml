services:
  op-connect-api:
    image: 1password/connect-api:1.8.2@sha256:e915c0c843972f02b0e7e2de502bda8bd4a092288b3f1866098a857bd715a281
    container_name: op-connect-api
    ports:
      - "8080:8080"
    volumes:
      - "./1password-credentials.json:/home/opuser/.op/1password-credentials.json"
      - "op_data:/home/opuser/.op/data"
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - proxy
    environment:
      - TZ=${TZ}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.opapi.rule=Host(`opapi.${FULL_DOMAIN}`)"
      - "traefik.http.routers.opapi.entrypoints=https"
      - "traefik.http.routers.opapi.tls=true"
      - "traefik.http.services.opapi.loadbalancer.server.port=8080"

  op-connect-sync:
    image: 1password/connect-sync:1.8.2@sha256:6297ca6136c0f0fb096bc64c49e1bc8df2aab35282ebff8c7bb60745ef176d0d
    container_name: op-connect-sync
    ports:
      - "8081:8080"
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - proxy
    volumes:
      - "./1password-credentials.json:/home/opuser/.op/1password-credentials.json"
      - "op_data:/home/opuser/.op/data"
    environment:
      - TZ=${TZ}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.opsync.rule=Host(`opsync.${FULL_DOMAIN}`)"
      - "traefik.http.routers.opsync.entrypoints=https"
      - "traefik.http.routers.opsync.tls=true"
      - "traefik.http.services.opsync.loadbalancer.server.port=8081"

volumes:
  op_data:
    driver: local
    name: op_data

networks:
  proxy:
    external: true
