- Infrastructure:
  - Proxmox VE 1:
    - icon: proxmox.png
      href: https://pve1.knxcloud.io:8006
      description: Proxmox Hypervisor — pve1
      widget:
        type: proxmox
        url: https://pve1.knxcloud.io:8006
        username: ${PVE_USER}
        password: ${PVE_PASSWORD}
        node: pve1
  - Proxmox VE 2:
    - icon: proxmox.png
      href: https://pve2.knxcloud.io:8006
      description: Proxmox Hypervisor — pve2
      widget:
        type: proxmox
        url: https://pve2.knxcloud.io:8006
        username: ${PVE_USER}
        password: ${PVE_PASSWORD}
        node: pve2
  - Pi-hole:
    - icon: pi-hole.png
      href: http://192.168.1.202/admin
      description: Primary DNS
      widget:
        type: pihole
        url: http://192.168.1.202
        version: 6
        key: ${PIHOLE_PASSWORD}
  - Pi-hole Backup:
    - icon: pi-hole.png
      href: http://192.168.3.254/admin
      description: Backup DNS
      widget:
        type: pihole
        url: http://192.168.3.254
        version: 6
        key: ${PIHOLE_BACKUP_PASSWORD}

